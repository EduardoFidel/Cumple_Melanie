<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melanie 27 - Galería</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Karla:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body {
            /* Aquí va la ruta de tu imagen .jpeg */
            background-image: url('fondo.jpeg'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed; 
            font-family: 'Karla', sans-serif;
            text-align: center;
            padding: 40px 20px;
            color: #4A235A;
            margin: 0;
            overflow-x: hidden; 
        }

        /* --- CANVAS PARA LOS BRILLITOS --- */
        #sparklesCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Permite hacer clic a través de los brillitos */
            z-index: 9999; /* ¡Ahora está por encima de todo! */
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.6); 
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(8px); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
            z-index: 10;
        }
        
        h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 3rem;
            color: #4A235A;
            margin-bottom: 10px;
        }

        .gold-accent {
            color: #D4AF37;
            font-style: italic;
        }

        /* --- GRILLA DE FOTOS --- */
        .photo-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr; 
            gap: 15px;
            align-items: center; 
            margin: 40px 0;
        }

        .photo-item {
            width: 100%;
            object-fit: cover;
            border: 2px solid #D4AF37; 
            box-shadow: 5px 5px 15px rgba(74, 35, 90, 0.15);
            border-radius: 8px; 
            opacity: 0; 
        }

        .img-1 { height: 200px; }
        .img-2 { height: 280px; border-width: 3px; }
        .img-3 { height: 200px; }

        /* --- ANIMACIONES DE ENTRADA --- */
        @keyframes elegantFadeUp {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .img-2 {
            animation: elegantFadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            animation-delay: 0.2s;
        }

        .img-1 {
            animation: elegantFadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            animation-delay: 0.8s;
        }
        
        .img-3 {
            animation: elegantFadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            animation-delay: 1.0s;
        }

        /* --- INFO CARD --- */
        .info-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .detail {
            margin: 15px 0;
            font-size: 1.1rem;
            border-bottom: 1px dashed #ddd;
            padding-bottom: 15px;
        }
        
        .detail strong {
            display: block;
            color: #D4AF37;
            font-family: 'DM Serif Display', serif;
            font-size: 1.3rem;
            margin-bottom: 5px;
        }

        .rsvp-btn {
            display: inline-block;
            margin-top: 20px;
            background: linear-gradient(45deg, #7B1FA2, #9C27B0);
            color: white;
            text-decoration: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(123, 31, 162, 0.3);
            transition: transform 0.2s;
        }
        
        .rsvp-btn:hover { transform: scale(1.05); }

        /* --- OPTIMIZACIÓN PARA MÓVILES --- */
        @media (max-width: 600px) {
            .container { padding: 20px; }
            h1 { font-size: 2.5rem; }
            .photo-grid { gap: 8px; }
            .img-1, .img-3 { height: 150px; }
            .img-2 { height: 220px; }
            .info-card { padding: 20px; }
        }
    </style>
</head>
<body>

    <canvas id="sparklesCanvas"></canvas>

    <div class="container">
        <h1>Melanie <span class="gold-accent">27</span></h1>
        <p>Acompáñanos a celebrar un nuevo capítulo.</p>

        <div class="photo-grid">
            <img src="https://images.unsplash.com/photo-1516575334481-f85287c2c81d?q=80&w=1374&auto=format&fit=crop" class="photo-item img-1" alt="Foto 1">
            <img src="https://images.unsplash.com/photo-1616091093729-c046cd956a07?q=80&w=1374&auto=format&fit=crop" class="photo-item img-2" alt="Foto Principal">
            <img src="https://images.unsplash.com/photo-1485230405346-71acb9518d9c?q=80&w=1549&auto=format&fit=crop" class="photo-item img-3" alt="Foto 3">
        </div>

        <div class="info-card">
            <div class="detail">
                <strong>¿Cuándo?</strong>
                Viernes, 6 de Marzo — 8:00 PM
            </div>
            <div class="detail">
                <strong>¿Dónde?</strong>
                Av. Arequipa 1234, Lima
            </div>
            
            <a href="https://wa.me/51999999999" class="rsvp-btn">Confirmar Asistencia</a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('sparklesCanvas');
        const ctx = canvas.getContext('2d');
        
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        
        const particles = [];
        const numParticles = 120; // Ligeramente menos para que no sature la pantalla
        
        // Gravedad mucho más lenta para simular caída suave
        let gravityX = 0;
        let gravityY = 0.03; 

        // Escuchar el movimiento del dispositivo (Giroscopio)
        window.addEventListener('deviceorientation', (e) => {
            if (e.gamma !== null && e.beta !== null) {
                gravityX = (e.gamma / 90) * 0.15; // Reacción más sutil
                gravityY = Math.max(0.01, (e.beta / 90) * 0.15); 
            }
        });

        class Particle {
            constructor() {
                // Radio más pequeño, como arena
                this.radius = Math.random() * 2 + 0.8; 
                this.x = Math.random() * width;
                this.y = -Math.random() * height - 100; // Empiezan más arriba
                // Velocidad inicial súper lenta
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = Math.random() * 0.5;
                
                // Paleta de dorados brillantes y blancos
                const colors = ['#FFDF00', '#D4AF37', '#FFF8DC', '#FFFFFF', '#FDB813'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                
                this.friction = 0.6; // Se frena más rápido al tocar el piso (como arena)
                this.restitution = 0.2; // Casi no rebota
                
                // Para rotar las estrellitas
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.05;
            }

            update() {
                this.vx += gravityX;
                this.vy += gravityY;

                // Resistencia del aire para que floten un poco
                this.vx *= 0.99;
                this.vy *= 0.99;

                this.x += this.vx;
                this.y += this.vy;
                this.rotation += this.rotationSpeed;

                // Colisión con el piso
                if (this.y + this.radius > height) {
                    this.y = height - this.radius;
                    this.vy *= -this.restitution; 
                    this.vx *= this.friction; 
                }

                // Colisión con paredes
                if (this.x + this.radius > width) {
                    this.x = width - this.radius;
                    this.vx *= -this.restitution;
                } else if (this.x - this.radius < 0) {
                    this.x = this.radius;
                    this.vx *= -this.restitution;
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                // Efecto de brillo (Glow)
                ctx.shadowBlur = 6;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;

                // Dibujar una estrella de 4 puntas (Brillito)
                ctx.beginPath();
                const spikes = 4;
                const outerRadius = this.radius * 2;
                const innerRadius = this.radius * 0.5;
                
                let rot = Math.PI / 2 * 3;
                let x = 0; let y = 0;
                let step = Math.PI / spikes;

                ctx.moveTo(0, -outerRadius);
                for (let i = 0; i < spikes; i++) {
                    x = Math.cos(rot) * outerRadius;
                    y = Math.sin(rot) * outerRadius;
                    ctx.lineTo(x, y);
                    rot += step;

                    x = Math.cos(rot) * innerRadius;
                    y = Math.sin(rot) * innerRadius;
                    ctx.lineTo(x, y);
                    rot += step;
                }
                ctx.lineTo(0, -outerRadius);
                ctx.closePath();
                ctx.fill();
                
                ctx.restore();
            }
        }

        for (let i = 0; i < numParticles; i++) {
            particles.push(new Particle());
        }

        function animate() {
            // Limpiar el canvas con un poco de opacidad para dejar una mini estela (opcional, aquí está limpio)
            ctx.clearRect(0, 0, width, height);
            
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            
            requestAnimationFrame(animate);
        }

        animate();

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
