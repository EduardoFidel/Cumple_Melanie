<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melanie 27 - Galería</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Karla:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body {
            /* Aquí va la ruta de tu imagen .jpeg */
            background-image: url('fondo.jpeg'); 
            background-size: cover; /* Asegura que la imagen cubra toda la pantalla */
            background-position: center; /* Centra la imagen */
            background-attachment: fixed; /* Mantiene el fondo estático al hacer scroll */
            font-family: 'Karla', sans-serif;
            text-align: center;
            padding: 40px 20px;
            color: #4A235A;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            /* Agregamos un fondo blanco semitransparente para que el texto sea legible sobre la textura */
            background: rgba(255, 255, 255, 0.6); 
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(8px); /* Crea el efecto de vidrio esmerilado */
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 3rem;
            color: #4A235A;
            margin-bottom: 10px;
        }

        .gold-accent {
            color: #D4AF37;
            font-style: italic;
        }

        /* --- GRILLA DE FOTOS --- */
        .photo-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr; /* Tres columnas */
            gap: 10px;
            align-items: end; /* Alineados abajo */
            margin: 40px 0;
        }

        .photo-item {
            width: 100%;
            object-fit: cover;
            border: 2px solid #D4AF37; /* Borde dorado */
            box-shadow: 5px 5px 15px rgba(74, 35, 90, 0.15);
        }

        /* Foto Izquierda (Pequeña) */
        .img-1 {
            height: 150px;
            border-radius: 100px 100px 0 0; /* Forma de arco */
        }
        
        /* Foto Central (Grande) */
        .img-2 {
            height: 280px;
            border-radius: 200px 200px 0 0; /* Arco grande */
            border-width: 3px;
        }

        /* Foto Derecha (Pequeña) */
        .img-3 {
            height: 150px;
            border-radius: 100px 100px 0 0;
        }

        /* --- INFO CARD --- */
        .info-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .detail {
            margin: 15px 0;
            font-size: 1.1rem;
            border-bottom: 1px dashed #ddd;
            padding-bottom: 15px;
        }
        
        .detail strong {
            display: block;
            color: #D4AF37;
            font-family: 'DM Serif Display', serif;
            font-size: 1.3rem;
            margin-bottom: 5px;
        }

        .rsvp-btn {
            display: inline-block;
            margin-top: 20px;
            background: linear-gradient(45deg, #7B1FA2, #9C27B0);
            color: white;
            text-decoration: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(123, 31, 162, 0.3);
            transition: transform 0.2s;
        }
        
        .rsvp-btn:hover { transform: scale(1.05); }

    </style>
</head>
<body>

    <div class="container">
        <h1>Melanie <span class="gold-accent">27</span></h1>
        <p>Acompáñanos a celebrar un nuevo capítulo.</p>

        <div class="photo-grid">
            <img src="https://images.unsplash.com/photo-1516575334481-f85287c2c81d?q=80&w=1374&auto=format&fit=crop" class="photo-item img-1" alt="Foto 1">
            
            <img src="https://images.unsplash.com/photo-1616091093729-c046cd956a07?q=80&w=1374&auto=format&fit=crop" class="photo-item img-2" alt="Foto Principal">
            
            <img src="https://images.unsplash.com/photo-1485230405346-71acb9518d9c?q=80&w=1549&auto=format&fit=crop" class="photo-item img-3" alt="Foto 3">
        </div>

        <div class="info-card">
            <div class="detail">
                <strong>¿Cuándo?</strong>
                Viernes, 6 de Marzo — 8:00 PM
            </div>
            <div class="detail">
                <strong>¿Dónde?</strong>
                Av. Arequipa 1234, Lima
            </div>
            
            <a href="https://wa.me/51999999999" class="rsvp-btn">Confirmar Asistencia</a>
        </div>
    </div>

</body>
</html>
