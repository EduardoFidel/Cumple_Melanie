<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melanie's 27th Birthday</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        /* --- PALETA DE COLORES --- */
        :root {
            --bg-lila-suave: #FDFBFF; /* Lila ultra bajito, casi blanco perla */
            --lila-acento: #E6D9F2; /* Lila para sombras y detalles */
            --texto-oscuro: #3A204C; /* Violeta profundo para lectura */
            
            /* Dorado premium con mucho brillo */
            --gold-gradient: linear-gradient(135deg, #A67C00 0%, #BF953F 25%, #FCF6BA 50%, #B38728 75%, #FBF5B7 100%);
            --gold-solid: #BF953F;
        }

        body {
            background-color: var(--bg-lila-suave);
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            color: var(--texto-oscuro);
        }

        /* --- FLORES EN LAS ESQUINAS (Sutiles) --- */
        .floral-corner {
            position: fixed;
            width: 300px;
            height: 300px;
            background-size: contain;
            background-repeat: no-repeat;
            opacity: 0.15; /* Muy sutil para no saturar */
            pointer-events: none; /* Para que no interfieran al hacer clic */
            z-index: 0;
            /* Usamos un filtro para darle un tono lila/dorado */
            filter: sepia(100%) hue-rotate(240deg) saturate(30%);
        }

        .top-left {
            top: -50px;
            left: -50px;
            /* SVG de rama botánica incrustado */
            background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M10,90 Q30,50 90,10 Q80,30 90,40 Q60,40 50,60 Q40,80 10,90 Z" fill="black"/></svg>');
            transform: rotate(15deg);
        }

        .bottom-right {
            bottom: -50px;
            right: -50px;
            background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M90,10 Q70,50 10,90 Q20,70 10,60 Q40,60 50,40 Q60,20 90,10 Z" fill="black"/></svg>');
            transform: rotate(15deg);
        }

        /* --- TARJETA PRINCIPAL --- */
        .card {
            background: #ffffff;
            width: 100%;
            max-width: 480px;
            padding: 50px 35px;
            text-align: center;
            border-radius: 12px;
            position: relative;
            z-index: 1;
            
            /* Sombra elegante lila */
            box-shadow: 0 25px 50px rgba(58, 32, 76, 0.08);
            
            /* Borde dorado interior */
            border: 1px solid rgba(191, 149, 63, 0.2);
            outline: 2px solid rgba(191, 149, 63, 0.5);
            outline-offset: -12px;

            /* Animación de entrada */
            animation: fadeIn 1.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- CABECERA --- */
        .pre-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #88789A;
            margin-bottom: 15px;
        }

        .title {
            font-family: 'Playfair Display', serif;
            font-size: 3.8rem;
            font-weight: 700;
            margin: 0;
            line-height: 1;
            
            /* Efecto oro brillante */
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
            text-shadow: 0px 4px 15px rgba(191, 149, 63, 0.15);
        }

        .subtitle {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-style: italic;
            color: var(--texto-oscuro);
            margin-top: 5px;
            margin-bottom: 30px;
        }

        /* --- FOTO TIPO ARCO (De la Galería) --- */
        .arch-container {
            position: relative;
            width: 220px;
            height: 290px;
            margin: 0 auto 35px auto;
            /* Borde dorado con gradiente */
            padding: 4px;
            background: var(--gold-gradient);
            border-radius: 120px 120px 0 0;
            box-shadow: 0 15px 30px rgba(58, 32, 76, 0.15);
        }

        .arch-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 116px 116px 0 0;
            display: block;
            background-color: var(--lila-acento);
            /* Un filtro ligero para darle elegancia a la foto */
            filter: contrast(1.05) brightness(0.98);
        }

        /* --- DETALLES --- */
        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 30px 0;
            padding-top: 25px;
            border-top: 1px solid rgba(191, 149, 63, 0.2);
        }

        .detail-item {
            text-align: center;
        }

        .detail-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--gold-solid);
            font-weight: 600;
            display: block;
            margin-bottom: 5px;
        }

        .detail-value {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: var(--texto-oscuro);
        }

        .full-width {
            grid-column: 1 / -1;
            margin-top: 10px;
        }

        /* --- BOTÓN RSVP --- */
        .btn-gold {
            display: inline-block;
            background: var(--gold-gradient);
            color: #fff;
            text-decoration: none;
            padding: 16px 40px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 500;
            border-radius: 4px;
            box-shadow: 0 10px 20px rgba(191, 149, 63, 0.25);
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-gold:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(191, 149, 63, 0.4);
            filter: brightness(1.05);
        }

    </style>
</head>
<body>

    <div class="floral-corner top-left"></div>
    <div class="floral-corner bottom-right"></div>

    <div class="card">
        
        <div class="pre-title">Estás invitado a celebrar</div>
        
        <h1 class="title">Melanie</h1>
        <div class="subtitle">The 27th Birthday Soirée</div>

        <div class="arch-container">
            <img src="foto.jpeg" alt="Melanie" class="arch-photo">
        </div>

        <p style="font-size: 0.95rem; color: #666; line-height: 1.6; margin: 0 15px;">
            Acompáñanos a brindar por un nuevo capítulo lleno de luz, buenos momentos y la mejor compañía.
        </p>

        <div class="details-grid">
            <div class="detail-item">
                <span class="detail-label">Fecha</span>
                <span class="detail-value">Vie, 6 de Mar</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">Hora</span>
                <span class="detail-value">8:00 P.M.</span>
            </div>
            <div class="detail-item full-width">
                <span class="detail-label">Ubicación</span>
                <span class="detail-value" style="font-size: 1.1rem;">San Isidro, Lima</span>
                <div style="font-size: 0.8rem; color: #888; margin-top: 4px;">(Dirección exacta por interno)</div>
            </div>
        </div>

        <a href="https://wa.me/51978852214?text=¡Hola!%20Confirmo%20mi%20asistencia%20al%20cumple%20de%20Melanie%20:)" class="btn-gold">
            Confirmar Asistencia
        </a>

    </div>

</body>

</html>
